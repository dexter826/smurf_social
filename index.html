<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <meta name="theme-color" content="#0084ff" />
  <title>Smurfy</title>
  <meta name="description" content="Smurfy Social Network" />
  <meta property="og:title" content="Smurfy Social Network" />
  <meta property="og:description" content="Mạng xã hội kết nối cộng đồng Smurfy" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Smurfy Social Network" />
  <meta name="twitter:description" content="Mạng xã hội kết nối cộng đồng Smurfy" />
  <meta name="twitter:image" content="/twitter-image.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chống FOUC: apply theme trước khi render -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('smurf_social_theme');
        var mode = stored ? JSON.parse(stored).state?.mode : null;
        if (mode === 'dark') document.documentElement.classList.add('dark');
      } catch (e) { }
    })();
  </script>
</head>

<body class="antialiased overflow-hidden h-screen w-screen">
  <div id="root" class="h-full w-full"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
